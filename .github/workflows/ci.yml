name: CI

on:
  push:
    branches: [master, main, block-copy]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.17.0"

jobs:
  build:
    name: Build & Test (pg17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add PostgreSQL apt repository
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update

      - name: Install PostgreSQL 17
        run: sudo apt-get install -y postgresql-17 postgresql-server-dev-17

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.pgrx
          key: ${{ runner.os }}-pg17-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-pg17-cargo-

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "$PGRX_VERSION"; then
            cargo install cargo-pgrx --version "=$PGRX_VERSION" --locked
          fi

      - name: Initialize pgrx with system PostgreSQL 17
        run: cargo pgrx init --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: Build
        run: cargo build --no-default-features --features pg17

      - name: Test
        run: cargo pgrx test pg17
