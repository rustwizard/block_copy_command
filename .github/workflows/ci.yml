name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.17.0"

jobs:
  build:
    name: Build & Test (pg17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libreadline-dev zlib1g-dev \
            flex bison libxml2-dev libxslt-dev libssl-dev libicu-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and pgrx PostgreSQL build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.pgrx
          key: ${{ runner.os }}-pg17-pgrx${{ env.PGRX_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-pg17-pgrx${{ env.PGRX_VERSION }}-

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "$PGRX_VERSION"; then
            cargo install cargo-pgrx --version "=$PGRX_VERSION" --locked
          fi

      - name: Initialize pgrx (downloads and compiles PostgreSQL 17)
        run: cargo pgrx init --pg17 download

      - name: Build
        run: cargo build --no-default-features --features pg17

      - name: Test
        run: cargo pgrx test pg17
